<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" rx="48" fill="#0f172a" />

  <!-- radar grid: 4 axes (security / reliability / ergonomics / governance) -->
  <g stroke="#334155" stroke-width="2">
    <polygon points="128,68 188,128 128,188 68,128" fill="none" />
    <polygon points="128,98 158,128 128,158 98,128" fill="none" />
    <line x1="128" y1="128" x2="128" y2="68" />
    <line x1="128" y1="128" x2="188" y2="128" />
    <line x1="128" y1="128" x2="128" y2="188" />
    <line x1="128" y1="128" x2="68" y2="128" />
  </g>

  <!-- score polygon: asymmetric on purpose, like a real scan result -->
  <polygon
    points="128,78 173,128 128,178 88,128"
    fill="#ea580c33"
    stroke="#ea580c"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!-- axis tick dots -->
  <circle cx="128" cy="78" r="7" fill="#ea580c" />
  <circle cx="173" cy="128" r="7" fill="#ea580c" />
  <circle cx="128" cy="178" r="7" fill="#ea580c" />
  <circle cx="88" cy="128" r="7" fill="#ea580c" />
</svg>
